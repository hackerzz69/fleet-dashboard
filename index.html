<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fleet Intelligence Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- CSS -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header class="header">
    <h1>🚛 Fleet Intelligence Dashboard</h1>

    <div class="controls">
      <select id="truckSelect"></select>
      <select id="quarterSelect"></select>
    </div>
  </header>

  <!-- KPI CARDS -->
  <section class="kpis">
    <div class="kpi">
      <h3>Total Miles (Quarter)</h3>
      <div class="value" id="totalMiles">0</div>
      <div class="trend up">▲ 4.3% from last quarter</div>
    </div>

    <div class="kpi">
      <h3>IFTA Miles</h3>
      <div class="value" id="iftaMiles">0</div>
      <div class="trend">Across <span id="stateCount">0</span> states</div>
    </div>

    <div class="kpi">
      <h3>Fuel Purchased</h3>
      <div class="value" id="fuelGallons">0 gal</div>
      <div class="trend down">▼ 1.2% fuel efficiency</div>
    </div>

    <div class="kpi">
      <h3>Average MPG</h3>
      <div class="value" id="avgMpg">0</div>
      <div class="trend up">▲ Improved</div>
    </div>
  </section>

  <!-- MAIN GRID -->
  <section class="main">

    <div class="card">
      <h2>IFTA Mileage by State</h2>
      <table>
        <thead>
          <tr>
            <th>State</th>
            <th class="number">Miles</th>
          </tr>
        </thead>
        <tbody id="iftaTable"></tbody>
      </table>
    </div>

    <div class="card">
      <h2>Recent Trips</h2>
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Origin</th>
            <th>Destination</th>
            <th>Route</th>
            <th class="number">Miles</th>
          </tr>
        </thead>
        <tbody id="tripTable"></tbody>
      </table>
    </div>

  </section>

  <!-- JS -->
  <script src="app.js"></script>
</body>
</html>
